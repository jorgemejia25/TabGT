name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: xcodebuild -project TabGT.xcodeproj -scheme TabGT -destination 'platform=macOS' build
      - name: Unit tests
        run: xcodebuild -project TabGT.xcodeproj -scheme TabGT -destination 'platform=macOS' -only-testing:TabGTTests test
